# Build the siddur PDF(s) and publish them.
#
# Zero-network BUILD by design: the Typst binary is vendored in build/tools/
# (setup.sh unpacks it with tar/xz, both preinstalled on ubuntu-latest) and
# every font is vendored in build/fonts/. The runner has normal network, used
# only by the publish steps (Pages, Releases) — never by the compile itself.
#
# AR-5 (2026-07-09): the set of volumes is declared ONCE in build/volumes.json.
# A `volumes` job reads it and every downstream job fans out over it as a matrix,
# so adding a book is a one-line edit to that JSON — no workflow change.
#
# Triggers:
#   • push to main            → build + integrity gate every volume, then publish
#                               all current PDFs to GitHub Pages (a multi-book
#                               landing page; always-current links).
#   • pull request (build/**) → build + gate as a preview check; PDFs downloadable
#                               from the run's Artifacts.
#   • push a book-scoped tag  → e.g. `shabbat-v1.1`: build that one volume and
#     like `<prefix>-v*`         create a GitHub Release with its PDF attached.
#   • workflow_dispatch       → build on demand.
name: Build siddur

on:
  push:
    branches: ["main"]
    tags: ["*-v*"]
  pull_request:
    paths:
      - "build/**"
      - ".github/workflows/build-siddur.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-siddur-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Single source of truth: emit the volume list as a matrix.
  volumes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Check out
        uses: actions/checkout@v4
      - name: Read build/volumes.json
        id: set
        run: echo "matrix=$(jq -c . build/volumes.json)" >> "$GITHUB_OUTPUT"

  build:
    needs: volumes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        volume: ${{ fromJSON(needs.volumes.outputs.matrix) }}
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up vendored Typst toolchain
        run: bash build/setup.sh

      # NUL-byte integrity scan + full compile gate for every volume (also
      # regenerates the Mi Shebeirach selector; CI has no mi-shebeirach-local.typ,
      # so the public placeholder is what gets built).
      - name: Integrity gate (build/check.sh)
        run: bash build/check.sh

      - name: Compile ${{ matrix.volume.slug }}
        run: |
          /tmp/typst-bin/typst compile --font-path build/fonts \
            "build/${{ matrix.volume.entry }}" "${{ matrix.volume.pdf }}"

      - name: Short SHA for the artifact name
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.volume.slug }}-${{ env.SHORT_SHA }}
          path: ${{ matrix.volume.pdf }}
          if-no-files-found: error

  # Publish every current PDF to GitHub Pages on each push to the default branch.
  pages:
    needs: [volumes, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Check out
        uses: actions/checkout@v4
      - name: Set up vendored Typst toolchain
        run: bash build/setup.sh
      - name: Compile every volume into the site
        run: |
          mkdir -p _site
          jq -c '.[]' build/volumes.json | while IFS= read -r row; do
            entry=$(echo "$row" | jq -r .entry)
            pdf=$(echo "$row" | jq -r .pdf)
            /tmp/typst-bin/typst compile --font-path build/fonts "build/$entry" "_site/$pdf"
          done
      - name: Write the landing page (one card per volume)
        run: |
          python3 - <<'PY' > _site/index.html
          import json, html
          vols = json.load(open("build/volumes.json"))
          cards = []
          for v in vols:
              cards.append(
                  '<article class="card">'
                  f'<div class="he">{html.escape(v.get("title_he",""))}</div>'
                  f'<h2>{html.escape(v["title"])}</h2>'
                  f'<p>{html.escape(v.get("blurb",""))}</p>'
                  f'<p><a class="btn" href="{html.escape(v["pdf"])}">Download the PDF</a></p>'
                  '</article>')
          first_pdf = html.escape(vols[0]["pdf"]) if vols else ""
          print(f"""<!doctype html><html lang="en"><head><meta charset="utf-8">
          <meta name="viewport" content="width=device-width,initial-scale=1">
          <title>Shirei Shabbat</title>
          <style>
            :root{{color-scheme:light}}
            body{{margin:0;font:16px/1.5 Georgia,'Times New Roman',serif;color:#2b2b33;background:#fbfaf7}}
            header{{padding:2rem 1.25rem 1rem;text-align:center}}
            h1{{margin:.2rem 0;font-size:1.9rem}}
            .cards{{max-width:52rem;margin:0 auto;padding:0 1rem;display:grid;gap:1rem;grid-template-columns:repeat(auto-fit,minmax(18rem,1fr))}}
            .card{{border:1px solid #e6e1d5;border-radius:10px;padding:1.1rem;text-align:center;background:#fffdf9}}
            .he{{font-size:1.5rem;color:#8a6d1f}}
            h2{{margin:.3rem 0;font-size:1.3rem}}
            p{{margin:.5rem auto;color:#4a4a52}}
            a.btn{{display:inline-block;margin:.4rem;padding:.55rem 1.05rem;border:1px solid #8a6d1f;border-radius:8px;color:#8a6d1f;text-decoration:none}}
            iframe{{display:block;width:100%;height:80vh;border:0;border-top:1px solid #e6e1d5;margin-top:1rem}}
          </style></head>
          <body>
          <header>
            <h1>The Shirei Shabbat family</h1>
            <p>Complete, sung prayerbooks from Central Reform Congregation, St. Louis. These pages always show the latest builds.</p>
            <p><a class="btn" href="https://github.com/RavBogard/shirei-shabbat-siddur">Source &amp; how to fork</a></p>
          </header>
          <section class="cards">
          {''.join(cards)}
          </section>
          <iframe src="{first_pdf}" title="Latest volume (PDF)"></iframe>
          </body></html>""")
          PY
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  # Attach the right volume's PDF to a GitHub Release when a book-scoped version
  # tag (<prefix>-v*, e.g. shabbat-v1.1) is pushed. The tag's prefix selects the
  # volume via its tag_prefix field in build/volumes.json.
  release:
    needs: [volumes, build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out
        uses: actions/checkout@v4
      - name: Set up vendored Typst toolchain
        run: bash build/setup.sh
      - name: Resolve the volume and build its release PDF
        run: |
          tag="${GITHUB_REF_NAME}"          # e.g. shabbat-v1.1
          prefix="${tag%-v*}"               # e.g. shabbat
          row=$(jq -c --arg p "$prefix" '.[] | select(.tag_prefix==$p)' build/volumes.json)
          if [ -z "$row" ]; then
            echo "No volume in build/volumes.json has tag_prefix '$prefix' (tag '$tag')." >&2
            exit 1
          fi
          entry=$(echo "$row" | jq -r .entry)
          title=$(echo "$row" | jq -r .title)
          out="${title// /-}-${tag}.pdf"
          /tmp/typst-bin/typst compile --font-path build/fonts "build/$entry" "$out"
          echo "REL_PDF=$out" >> "$GITHUB_ENV"
          echo "REL_TITLE=$title" >> "$GITHUB_ENV"
      - name: Create the release and attach the PDF
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "${REL_PDF}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${REL_TITLE} ${GITHUB_REF_NAME}" \
            --notes "Compiled siddur PDF for ${GITHUB_REF_NAME}, built from the vendored zero-network Typst toolchain in this repo. The healing prayer prints the public classical-formula placeholder (see FORK-YOUR-OWN.md §6)."
